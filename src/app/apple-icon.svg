  />

  <!-- F monogram -->
  <!-- Vertical stem -->
  <line x1="72" y1="54" x2="72" y2="126" stroke="#F5F5F4" stroke-width="11" stroke-linecap="round"/>
  <!-- Top crossbar -->
  <line x1="72" y1="54" x2="114" y2="54" stroke="#F5F5F4" stroke-width="11" stroke-linecap="round"/>
  <!-- Mid crossbar -->
